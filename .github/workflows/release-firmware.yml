name: Release firmware

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (vMAJOR.MINOR.PATCH-light)
        required: true
        type: string

jobs:
  validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.ref_type == 'branch' && github.sha || (github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}
      - name: Initialize AWTRIX3 source
        run: git submodule update --init awtrix3
      - name: Determine release tag
        id: release-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          TRIGGER_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == 'push' && "$REF_TYPE" == 'branch' ]]; then
            RELEASE_TAG="v$(tr -d '\r\n' < version)"
          else
            RELEASE_TAG="$TRIGGER_RELEASE_TAG"
          fi
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-light$ ]]
          printf 'RELEASE_TAG=%s\n' "$RELEASE_TAG" >> "$GITHUB_ENV"
          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install PlatformIO Core 6.1.18
        run: python3 -m pip install --disable-pip-version-check platformio==6.1.18
      - name: Install animation asset dependencies
        run: python3 -m pip install --disable-pip-version-check -r tools/animation-assets-requirements.txt
      - name: Run project tests
        shell: bash
        run: |
          set -euo pipefail
          node tests/app_localization_test.js
          node tests/runtime_transport_test.js
          node tests/cast_tools_stopwatch_test.js
          python3 tests/runtime_protocol_fixture.py
          python3 tests/integrations_test_routes.py
          python3 tests/custom_app_uninstall_contract_test.py
          python3 tests/discovery_regression_test.py
          python3 tests/animation_assets_test.py
          python3 tests/ota_release_contract_test.py
          python3 tests/ota_routes_test.py
          python3 tests/release_firmware_contract_test.py
      - name: Build and validate release artifacts
        shell: bash
        run: |
          set -euo pipefail
          tools/release_firmware.sh --tag "$RELEASE_TAG" --dist dist/release
      - name: Upload validated release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-firmware
          path: dist/release

  publishing:
    needs: validation
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'tag') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download validated release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-firmware
          path: dist/release
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validation.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          GH_TOKEN="$GITHUB_TOKEN" gh release create "$RELEASE_TAG" dist/release/* --repo uniqueding/awtrix-light --title "$RELEASE_TAG" --generate-notes
